<script>
// ── TAB SWITCHING ──
function switchTab(cat, tab, btn) {
  const panels = document.querySelectorAll(`[id^="${cat}-"]`);
  panels.forEach(p => { if(p.classList.contains('tab-panel')) p.classList.remove('active'); });
  const target = document.getElementById(`${cat}-${tab}`);
  if(target) target.classList.add('active');

  const navId = cat === 'pod' ? 'pod-tabs' : (cat === 'kdp' ? 'kdp-tabs' : 'vid-tabs');
  document.getElementById(navId).querySelectorAll('.tab-btn').forEach(b => {
    b.className = 'tab-btn';
  });
  btn.classList.add(`active-${cat}`);
}

// ── ADD TABLE ROW ──
function addTableRow(tbodyId, cols) {
  const tb = document.getElementById(tbodyId);
  const tr = document.createElement('tr');
  const rowNum = tb.rows.length + 1;
  for(let i = 0; i < cols; i++) {
    const td = document.createElement('td');
    if(i === 0) {
      td.innerHTML = `<input type="text" value="${rowNum}">`;
    } else if(i === cols - 1) {
      td.innerHTML = `<select class="status-select"><option>📝 Draft</option><option>✏️ WIP</option><option>✅ Done</option></select>`;
    } else if(i === cols - 2 && cols > 3) {
      td.innerHTML = `<textarea style="height:36px;min-height:36px;" placeholder="Notes…"></textarea>`;
    } else {
      td.innerHTML = `<input type="text" placeholder="—">`;
    }
    tr.appendChild(td);
  }
  tb.appendChild(tr);
}

// ── IDEA CARDS ──
function addIdeaCard(gridId, cat) {
  const grid = document.getElementById(gridId);
  const btn = grid.querySelector('.add-idea-btn');
  const card = document.createElement('div');
  card.className = 'idea-card';
  card.innerHTML = `
    <textarea placeholder="New idea…"></textarea>
    <div class="idea-card-footer">
      <span class="idea-tag">IDEA</span>
      <span class="idea-status" onclick="cycleStatus(this)">🔲</span>
    </div>`;
  grid.insertBefore(card, btn);
}

const statuses = ['🔲','⭐','✅','🔥','❌'];
function cycleStatus(el) {
  const i = statuses.indexOf(el.textContent);
  el.textContent = statuses[(i+1) % statuses.length];
}

// ── IMAGE PREVIEW ──
function triggerUpload(id) {
  document.getElementById(id).click();
}
function previewImages(event, previewId) {
  const preview = document.getElementById(previewId);
  const files = Array.from(event.target.files);
  files.forEach(file => {
    const item = document.createElement('div');
    item.className = 'preview-item';
    if(file.type.startsWith('image/')) {
      const img = document.createElement('img');
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.readAsDataURL(file);
      item.appendChild(img);
    } else {
      item.textContent = file.name.slice(0,12) + (file.name.length > 12 ? '…' : '');
    }
    const rmBtn = document.createElement('button');
    rmBtn.className = 'preview-remove';
    rmBtn.textContent = '×';
    rmBtn.onclick = (e) => { e.stopPropagation(); item.remove(); };
    item.appendChild(rmBtn);
    preview.appendChild(item);
  });
}

// ── EMBED SHEET ──
function embedSheet(inputId, frameId) {
  let url = document.getElementById(inputId).value.trim();
  const wrapper = document.getElementById(frameId);
  if(!url) { wrapper.textContent = 'Please enter a valid URL.'; return; }
  // Convert Google Sheets URL to embed format
  if(url.includes('docs.google.com/spreadsheets')) {
    url = url.replace('/edit', '/htmlview').replace('/pub?', '/pub?widget=true&');
    if(!url.includes('htmlview') && !url.includes('/pub')) {
      url = url.split('?')[0] + '/htmlview';
    }
  }
  wrapper.innerHTML = `<iframe src="${url}" width="100%" height="400" frameborder="0"></iframe>`;
}

// ── LINKS ──
function addLink(inputId, labelId, listId) {
  const url = document.getElementById(inputId).value.trim();
  const label = document.getElementById(labelId).value.trim() || url;
  if(!url) return;
  const list = document.getElementById(listId);
  const li = document.createElement('li');
  li.className = 'link-item';
  li.innerHTML = `
    <span class="link-dot"></span>
    <a href="${url}" class="link-href" target="_blank" rel="noopener">${label}</a>
    <button class="link-remove" onclick="this.parentElement.remove()">×</button>`;
  list.appendChild(li);
  document.getElementById(inputId).value = '';
  document.getElementById(labelId).value = '';
}
</script>
