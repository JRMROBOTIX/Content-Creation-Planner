<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Creation Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --cream: #f5f0e8;
    --warm: #faf7f2;
    --kdp-accent: #c17d3c;
    --kdp-light: #fdf3e7;
    --kdp-border: #e8c99a;
    --vid-accent: #3a7ca5;
    --vid-light: #e8f4fc;
    --vid-border: #9ecae1;
    --pod-accent: #7c4d8a;
    --pod-light: #f3eaf7;
    --pod-border: #c9a8d8;
    --muted: #888;
    --line: #e2ddd6;
    --shadow: 0 2px 12px rgba(26,26,46,0.07);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .page-header {
    background: var(--ink);
    color: var(--cream);
    padding: 60px 60px 48px;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.02) 40px,
      rgba(255,255,255,0.02) 80px
    );
  }
  .header-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--kdp-accent);
    margin-bottom: 16px;
  }
  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 20px;
    position: relative;
  }
  .page-title span { color: var(--kdp-accent); }
  .page-subtitle {
    font-size: 16px;
    color: rgba(245,240,232,0.65);
    max-width: 520px;
    line-height: 1.6;
    margin-bottom: 36px;
  }
  .cat-pills { display: flex; gap: 12px; flex-wrap: wrap; }
  .cat-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 500;
  }
  .pill-kdp { background: var(--kdp-accent); color: #fff; }
  .pill-vid { background: var(--vid-accent); color: #fff; }
  .pill-pod { background: var(--pod-accent); color: #fff; }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 32px 100px;
  }

  /* ── TOC ── */
  .toc-bar {
    background: white;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 28px;
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  .toc-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 8px;
  }
  .toc-link {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    padding: 5px 12px;
    border-radius: 6px;
    transition: background .15s;
  }
  .toc-link:hover { background: var(--cream); }
  .toc-link.kdp { color: var(--kdp-accent); }
  .toc-link.vid { color: var(--vid-accent); }
  .toc-link.pod { color: var(--pod-accent); }

  /* ── CATEGORY SECTION ── */
  .cat-section { margin-bottom: 64px; }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid;
  }
  .cat-header.kdp { border-color: var(--kdp-border); }
  .cat-header.vid { border-color: var(--vid-border); }
  .cat-header.pod { border-color: var(--pod-border); }

  .cat-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .kdp .cat-icon { background: var(--kdp-light); }
  .vid .cat-icon { background: var(--vid-light); }
  .pod .cat-icon { background: var(--pod-light); }

  .cat-title-wrap {}
  .cat-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .kdp .cat-num { color: var(--kdp-accent); }
  .vid .cat-num { color: var(--vid-accent); }
  .pod .cat-num { color: var(--pod-accent); }

  .cat-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
  }

  /* ── TABS ── */
  .tabs-container { position: relative; }
  .tab-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 0;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    font-weight: 500;
    padding: 10px 20px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active-kdp { color: var(--kdp-accent); border-bottom-color: var(--kdp-accent); }
  .tab-btn.active-vid { color: var(--vid-accent); border-bottom-color: var(--vid-accent); }
  .tab-btn.active-pod { color: var(--pod-accent); border-bottom-color: var(--pod-accent); }

  .tab-panel {
    display: none;
    background: white;
    border: 1px solid var(--line);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 28px 28px 32px;
    box-shadow: var(--shadow);
  }
  .tab-panel.active { display: block; }

  /* ── PANEL CONTENT ── */
  .panel-section { margin-bottom: 28px; }
  .panel-section:last-child { margin-bottom: 0; }
  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  textarea, input[type="text"], input[type="url"] {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--warm);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    line-height: 1.6;
  }
  textarea:focus, input:focus {
    border-color: #aaa;
    box-shadow: 0 0 0 3px rgba(26,26,46,0.06);
  }
  textarea { min-height: 90px; }
  .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .input-row input { flex: 1; }

  /* ── TABLE ── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--warm);
  }
  .data-table td {
    padding: 0;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  .data-table td input, .data-table td textarea {
    border: none;
    border-radius: 0;
    background: transparent;
    padding: 10px 12px;
    min-height: unset;
    resize: none;
    font-size: 13px;
  }
  .data-table td input:focus, .data-table td textarea:focus {
    background: var(--warm);
    box-shadow: none;
    border-radius: 4px;
  }
  .data-table tr:hover td { background: rgba(245,240,232,0.5); }

  .add-row-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    text-align: center;
    transition: all .15s;
  }
  .add-row-btn:hover { border-color: #aaa; color: var(--ink); background: var(--cream); }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border: 2px dashed var(--line);
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--warm);
    position: relative;
  }
  .upload-zone:hover { border-color: #aaa; background: var(--cream); }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 28px; margin-bottom: 10px; }
  .upload-text { font-size: 13px; color: var(--muted); }
  .upload-text strong { color: var(--ink); font-weight: 600; }
  .upload-preview {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px;
  }
  .preview-item {
    width: 80px; height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    position: relative;
    background: #eee;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--muted);
    text-align: center;
  }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-remove {
    position: absolute; top: 3px; right: 3px;
    background: rgba(0,0,0,0.5); color: #fff;
    border: none; border-radius: 50%;
    width: 18px; height: 18px;
    cursor: pointer; font-size: 11px;
    display: none; align-items: center; justify-content: center;
  }
  .preview-item:hover .preview-remove { display: flex; }

  /* ── LINK MANAGER ── */
  .link-list { list-style: none; }
  .link-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .link-item:last-child { border-bottom: none; }
  .link-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .link-href { flex: 1; color: var(--vid-accent); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .link-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; line-height: 1; }
  .link-remove:hover { color: #e74c3c; }

  /* ── SPREADSHEET EMBED ── */
  .embed-box {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .embed-toolbar {
    background: var(--warm);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line);
  }
  .embed-toolbar input { flex: 1; font-size: 13px; background: white; }
  .embed-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: white;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .embed-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .embed-frame-wrapper {
    min-height: 300px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px;
    background: var(--cream);
  }
  .embed-frame-wrapper iframe { width: 100%; border: none; }

  /* ── KANBAN / IDEA CARDS ── */
  .idea-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 4px;
  }
  .idea-card {
    background: var(--warm);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 14px 12px;
    position: relative;
    cursor: default;
  }
  .idea-card textarea {
    background: transparent;
    border: none;
    padding: 0;
    font-size: 13px;
    min-height: 70px;
    resize: none;
  }
  .idea-card textarea:focus { box-shadow: none; }
  .idea-card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 10px;
  }
  .idea-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 12px;
    background: var(--cream);
    color: var(--muted);
    border: 1px solid var(--line);
  }
  .idea-status {
    font-size: 16px;
    cursor: pointer;
    user-select: none;
  }
  .add-idea-btn {
    grid-column: 1 / -1;
    border: 2px dashed var(--line);
    border-radius: 10px;
    padding: 14px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
  }
  .add-idea-btn:hover { border-color: #aaa; color: var(--ink); background: var(--cream); }

  /* ── PROGRESS BAR ── */
  .progress-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }
  .progress-name { font-size: 13px; min-width: 100px; }
  .progress-track {
    flex: 1; height: 8px;
    background: var(--line); border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    background: var(--kdp-accent);
    transition: width .3s;
  }
  .progress-fill.vid { background: var(--vid-accent); }
  .progress-fill.pod { background: var(--pod-accent); }
  .progress-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); min-width: 36px; text-align: right; }

  /* ── STATUS BADGE ── */
  .status-select {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 4px 8px;
    background: var(--warm);
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }

  /* ── COLOR DIVIDER ── */
  .divider {
    height: 1px; background: var(--line); margin: 40px 0;
  }

  /* ── NOTES AREA ── */
  .notes-area {
    border-left: 3px solid var(--line);
    padding-left: 16px;
    margin-top: 6px;
  }
  .notes-area textarea { background: transparent; border: none; font-size: 14px; line-height: 1.7; min-height: 120px; color: var(--ink); }
  .notes-area textarea:focus { box-shadow: none; }

  /* ── FOOTER ── */
  .page-footer {
    text-align: center;
    padding: 32px;
    border-top: 1px solid var(--line);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 40px;
  }

  @media (max-width: 640px) {
    .page-header { padding: 36px 20px 32px; }
    .main { padding: 28px 16px 60px; }
    .tab-panel { padding: 18px 16px; }
  }

  /* Scroll animation */
  .fade-in {
    opacity: 0; transform: translateY(20px);
    animation: fadeUp .5s ease forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: none; }
  }
  .cat-section:nth-child(1) { animation-delay: .1s; }
  .cat-section:nth-child(2) { animation-delay: .2s; }
  .cat-section:nth-child(3) { animation-delay: .3s; }
</style>
</head>
<body>

<!-- ══════════════════════════════════ HEADER ══════════════════════════════════ -->
<header class="page-header">
  <div class="header-badge">✦ Premium Template · Content Studio</div>
  <h1 class="page-title">Content Creation<br><span>Planner</span></h1>
  <p class="page-subtitle">Your all-in-one workspace for KDP Storybook eBooks, Video Production, and Print-on-Demand — from idea to launch.</p>
  <div class="cat-pills">
    <span class="cat-pill pill-kdp">📚 KDP Storyboard</span>
    <span class="cat-pill pill-vid">🎥 Video Creation</span>
    <span class="cat-pill pill-pod">👕 Print on Demand</span>
  </div>
</header>

<!-- ══════════════════════════════════ MAIN ══════════════════════════════════ -->
<main class="main">

  <!-- TOC -->
  <nav class="toc-bar">
    <span class="toc-label">Jump to</span>
    <a href="#kdp" class="toc-link kdp">📚 KDP Storyboard</a>
    <a href="#video" class="toc-link vid">🎥 Video Creation</a>
    <a href="#pod" class="toc-link pod">👕 Print on Demand</a>
  </nav>

  <!-- ─────────────────────────────── KDP ─────────────────────────────── -->
  <section id="kdp" class="cat-section fade-in">
    <div class="cat-header kdp">
      <div class="cat-icon">📚</div>
      <div class="cat-title-wrap">
        <div class="cat-num">Category 01</div>
        <div class="cat-name">KDP Storyboard eBook Creation</div>
      </div>
    </div>

    <!-- Tab nav -->
    <div class="tabs-container">
      <div class="tab-nav" id="kdp-tabs">
        <button class="tab-btn active-kdp" onclick="switchTab('kdp','ideas',this)">💡 Ideas</button>
        <button class="tab-btn" onclick="switchTab('kdp','storyboard',this)">🗂 Storyboard</button>
        <button class="tab-btn" onclick="switchTab('kdp','characters',this)">🧑‍🎨 Characters</button>
        <button class="tab-btn" onclick="switchTab('kdp','chapters',this)">📖 Chapters</button>
        <button class="tab-btn" onclick="switchTab('kdp','transcript',this)">📝 Transcript</button>
        <button class="tab-btn" onclick="switchTab('kdp','assets',this)">🖼 Assets & Links</button>
      </div>

      <!-- IDEAS -->
      <div id="kdp-ideas" class="tab-panel active">
        <div class="panel-section">
          <div class="panel-label">Book Title & Concept</div>
          <input type="text" placeholder="Working title…">
        </div>
        <div class="panel-section">
          <div class="panel-label">Genre / Niche</div>
          <div class="input-row">
            <input type="text" placeholder="e.g. Children's Adventure, Self-Help, Fantasy…">
            <select class="status-select">
              <option>💡 Idea</option><option>🔥 In Progress</option><option>✅ Published</option>
            </select>
          </div>
        </div>
        <div class="panel-section">
          <div class="panel-label">Idea Cards</div>
          <div class="idea-grid" id="kdp-idea-grid">
            <div class="idea-card">
              <textarea placeholder="Write your idea here…"></textarea>
              <div class="idea-card-footer"><span class="idea-tag">BRAINSTORM</span><span class="idea-status" onclick="cycleStatus(this)">⭐</span></div>
            </div>
            <div class="idea-card">
              <textarea placeholder="Market research note…"></textarea>
              <div class="idea-card-footer"><span class="idea-tag">RESEARCH</span><span class="idea-status" onclick="cycleStatus(this)">🔲</span></div>
            </div>
            <button class="add-idea-btn" onclick="addIdeaCard('kdp-idea-grid','kdp')">+ Add Idea Card</button>
          </div>
        </div>
        <div class="panel-section">
          <div class="panel-label">Target Audience & Keywords</div>
          <textarea placeholder="Age group, interests, Amazon keywords…"></textarea>
        </div>
      </div>

      <!-- STORYBOARD -->
      <div id="kdp-storyboard" class="tab-panel">
        <div class="panel-section">
          <div class="panel-label">Story Synopsis</div>
          <textarea style="min-height:120px;" placeholder="Write a short synopsis of the story…"></textarea>
        </div>
        <div class="panel-section">
          <div class="panel-label">Scene Breakdown Table</div>
          <table class="data-table">
            <thead><tr>
              <th style="width:50px">#</th>
              <th>Scene Title</th>
              <th>Setting</th>
              <th>Action / Events</th>
              <th>Notes</th>
              <th style="width:100px">Status</th>
            </tr></thead>
            <tbody id="kdp-scenes">
              <tr>
                <td><input type="text" value="1"></td>
                <td><input type="text" placeholder="Opening scene…"></td>
                <td><input type="text" placeholder="Location…"></td>
                <td><textarea style="min-height:36px;height:36px;" placeholder="What happens…"></textarea></td>
                <td><input type="text" placeholder="Notes…"></td>
                <td><select class="status-select"><option>📝 Draft</option><option>✏️ Writing</option><option>✅ Done</option></select></td>
              </tr>
            </tbody>
          </table>
          <button class="add-row-btn" onclick="addTableRow('kdp-scenes',6)">+ Add Scene</button>
        </div>
        <div class="panel-section">
          <div class="panel-label">Storyboard Images</div>
          <div class="upload-zone" onclick="triggerUpload('kdp-sb-upload')">
            <input type="file" id="kdp-sb-upload" accept="image/*" multiple onchange="previewImages(event,'kdp-sb-preview')">
            <div class="upload-icon">🖼</div>
            <div class="upload-text"><strong>Click to upload</strong> storyboard frames<br>PNG, JPG, GIF supported</div>
          </div>
          <div class="upload-preview" id="kdp-sb-preview"></div>
        </div>
      </div>

      <!-- CHARACTERS -->
      <div id="kdp-characters" class="tab-panel">
        <div class="panel-section">
          <div class="panel-label">Character Roster</div>
